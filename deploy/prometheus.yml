# Prometheus scrape config for SignalScope AI.
# Scrapes the existing /metrics/prometheus endpoint exposed by the backend.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: signalscope-backend
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: signalscope
          env: local
