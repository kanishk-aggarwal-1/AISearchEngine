services:
  - type: web
    name: signalscope-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m alembic upgrade head
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --workers 1"

    # Environment variables (use Render dashboard to set sensitive values)
    envVars:
      - key: PORT
        value: 8000

      - key: PYTHON_VERSION
        value: 3.12

      # Database: Neon PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: signalscope-db
          property: connectionString

      # Redis: Upstash
      - key: REDIS_URL
        sync: false

      # App config
      - key: FRONTEND_ORIGIN
        value: https://yourdomain.com

      - key: APP_BASE_URL
        value: https://yourdomain.com

      - key: CACHE_BACKEND
        value: redis

      - key: REDIS_PREFIX
        value: signalscope

      - key: STRICT_REAL_EMBEDDINGS
        value: "false"

      - key: RUN_DB_MIGRATIONS_ON_START
        value: "true"

      - key: LOG_FORMAT
        value: json

      - key: LOG_LEVEL
        value: INFO

      # Rate limiting
      - key: RATE_LIMIT_PER_MINUTE
        value: "90"

# PostgreSQL database on Neon
databases:
  - name: signalscope-db
    plan: free
    dbName: signalscope
    user: signalscope
    region: oregon
