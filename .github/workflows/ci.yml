name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      STRICT_REAL_EMBEDDINGS: "false"
      CACHE_BACKEND: "sqlite"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: python -m ruff check backend/ tests/ scripts/

      - name: Validate database migrations
        env:
          SQLITE_DATABASE_PATH: data/ci_migration.db
        run: python -m alembic upgrade head

      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short

  backend-postgres:
    runs-on: ubuntu-latest
    env:
      STRICT_REAL_EMBEDDINGS: "false"
      CACHE_BACKEND: "sqlite"
      PYTHONPATH: "."
      DATABASE_URL: "postgresql://signalscope:signalscope@localhost:5432/signalscope_test"
      TEST_DATABASE_URL: "postgresql://signalscope:signalscope@localhost:5432/signalscope_test"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: signalscope_test
          POSTGRES_USER: signalscope
          POSTGRES_PASSWORD: signalscope
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signalscope -d signalscope_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations against Postgres
        run: python -m alembic upgrade head

      - name: Run Postgres store contract tests
        run: python -m pytest tests/test_postgres_store.py -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npm run typecheck

      - name: Frontend tests
        run: cd frontend && npm test -- --no-coverage

      - name: Smoke build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: cd frontend && npm run test:smoke

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate .env from example
        run: cp .env.example .env
      - name: Validate docker-compose configs
        run: |
          docker compose config -q
          docker compose -f docker-compose.prod.yml config -q
